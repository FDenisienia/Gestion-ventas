# Configuración de Netlify
[build]
  # Comando para construir el proyecto
  command = "npm run build"
  # Directorio donde están los archivos construidos
  publish = "dist"
  
  # Variables de entorno
  [build.environment]
    NODE_VERSION = "18"
    NPM_FLAGS = "--legacy-peer-deps"
    NETLIFY = "true"

# Configuración de funciones
[functions]
  # Directorio de funciones
  directory = "netlify/functions"
  # Node.js runtime
  node_bundler = "esbuild"
  # Incluir archivos del servidor
  included_files = ["server/**"]

# Redirecciones para SPA (Single Page Application)
# Las rutas de API van a Netlify Functions, el resto al frontend
# Usar :splat para capturar toda la ruta después de /api
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
